x-airflow-common: &airflow-common
  build: .
  env_file: .env
  environment: &airflow-common-env
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER:-airflow}:${AIRFLOW_DB_PASSWORD:-airflow}@airflow-postgres:5432/${AIRFLOW_DB_NAME:-airflow}
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    BOOKING_DB_HOST: booking-postgres
    BOOKING_DB_PORT: "5432"
    BOOKING_DB_USER: ${BOOKING_DB_USER:-booking_user}
    BOOKING_DB_PASSWORD: ${BOOKING_DB_PASSWORD:-booking_pass}
    AIRFLOW__WEBSERVER__SECRET_KEY: 'booking_pipeline_secret_key_2024'
    BOOKING_DB_NAME: ${BOOKING_DB_NAME:-booking_db}
    DBT_PROFILES_DIR: /opt/airflow/dbt_project
  depends_on:
    airflow-postgres:
      condition: service_healthy
    booking-postgres:
      condition: service_healthy

services:
  airflow-postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${AIRFLOW_DB_USER:-airflow}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD:-airflow}
      POSTGRES_DB: ${AIRFLOW_DB_NAME:-airflow}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  booking-postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${BOOKING_DB_USER:-booking_user}
      POSTGRES_PASSWORD: ${BOOKING_DB_PASSWORD:-booking_pass}
      POSTGRES_DB: ${BOOKING_DB_NAME:-booking_db}
    ports:
      - "5434:5432"
    volumes:
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booking_user -d booking_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init
        airflow users create \
          --username airflow \
          --password airflow \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true
    depends_on:
      airflow-postgres:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    command: airflow webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
